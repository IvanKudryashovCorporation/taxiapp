services:
  postgres:
    image: postgres:16-alpine
    container_name: taxiapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxiapp
      POSTGRES_USER: taxiapp
      POSTGRES_PASSWORD: taxiapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
